<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATI | Monash Persona Indicator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-monash { background-color: #006DAE; }
        .text-monash { color: #006DAE; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -ms-overflow-style: none; scrollbar-width: none; overflow-x: hidden; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="bg-white rounded-[2rem] shadow-2xl max-w-lg w-full overflow-hidden border border-white relative">
        
        <div class="absolute top-4 right-6 text-[10px] font-black text-slate-300 uppercase tracking-widest z-10">Ver 2.0 Professional</div>

        <div id="welcome-screen" class="p-10 text-center fade-in">
            <h1 class="text-5xl font-black text-slate-900 mb-2 italic tracking-tighter">MATI</h1>
            <p class="text-monash font-bold text-sm tracking-[0.2em] mb-10">莫纳什人格测试 </p>
            <div class="mb-10 text-slate-400 text-[10px] leading-relaxed uppercase tracking-tight space-y-1 bg-slate-50 py-4 rounded-xl">
                <p>由莫纳什大学校友会制作，仅图一乐</p>
                <p>栖息偏好 / 战斗模式 / 社交雷达 / 能量引擎</p>
                <p class="pt-1 text-slate-300 font-medium">由专业逻辑与莫纳什梗引擎驱动</p>
            </div>
            <button onclick="startTest()" class="bg-monash text-white font-bold py-5 px-12 rounded-2xl hover:brightness-110 transition-all w-full shadow-lg text-xl active:scale-95">
                开始深度测评
            </button>
        </div>

        <div id="question-screen" class="hidden p-8 fade-in">
            <div class="flex justify-between items-end mb-4">
                <span class="text-monash font-black text-3xl" id="progress-num">01</span>
                <span class="text-slate-300 font-bold text-xs mb-1">/ 20</span>
            </div>
            <div class="w-full bg-slate-100 h-1.5 rounded-full mb-10">
                <div id="progress-bar" class="bg-monash h-full rounded-full transition-all duration-500" style="width: 5%"></div>
            </div>
            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug min-h-[5rem]"></h2>
            <div id="options-container" class="space-y-3"></div>
        </div>

        <div id="result-screen" class="hidden fade-in">
            <div class="bg-monash p-8 text-white text-center">
                <div id="result-code" class="text-6xl font-black mb-2 italic tracking-tighter">TYPE</div>
                <div id="result-ip" class="text-xl font-bold opacity-90 border-t border-white/20 pt-2 inline-block"></div>
            </div>
            <div class="p-6">
                <div class="rounded-2xl overflow-hidden shadow-inner bg-slate-50 border border-slate-100 mb-6">
                    <img id="result-image" src="" alt="Persona Card" class="w-full h-auto block">
                </div>
                <div class="space-y-5">
                    <div class="bg-blue-50/50 p-5 rounded-2xl border-l-4 border-monash">
                        <p class="text-[10px] text-monash font-black mb-1 tracking-widest uppercase">【莫纳什箴言】</p>
                        <p id="result-motto" class="text-slate-800 font-bold text-lg leading-tight"></p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-black mb-1 tracking-widest uppercase text-center">【性格画像】</p>
                        <p id="result-desc" class="text-slate-600 text-sm leading-relaxed text-center px-4"></p>
                    </div>
                    <div class="space-y-2 pt-2 text-xs">
                        <div class="flex items-start bg-slate-50 p-2 rounded-lg text-slate-600"><span class="font-bold text-slate-400 mr-2">🚫 克星:</span><span id="result-nemesis"></span></div>
                        <div class="flex items-start bg-green-50 p-2 rounded-lg text-green-800"><span class="font-bold text-green-600 mr-2">🤝 搭子:</span><span id="result-partner" class="font-bold"></span></div>
                        <div class="flex items-start bg-red-50 p-2 rounded-lg text-red-800"><span class="font-bold text-red-600 mr-2">⚡ 对手:</span><span id="result-enemy" class="font-bold"></span></div>
                    </div>
                </div>
                <div class="mt-8 space-y-3">
                    <button onclick="generateShareImage()" class="w-full py-4 bg-green-600 text-white font-bold rounded-2xl shadow-lg text-sm flex items-center justify-center active:scale-95">📸 生成 2.0 版认证海报</button>
                    <button onclick="openArchive()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-lg text-sm active:scale-95">📂 莫纳什人格档案</button>
                    <button onclick="location.reload()" class="w-full py-4 text-slate-300 font-bold text-xs uppercase tracking-widest">Retake the test</button>
                </div>
            </div>
        </div>

        <div id="archive-screen" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto p-4 animate-[fadeIn_0.3s_ease-out]">
            <div class="max-w-lg mx-auto">
                <div class="flex justify-between items-center mb-6 pt-4 px-2">
                    <h2 class="text-2xl font-black italic text-monash tracking-tighter">MATI 2.0 ARCHIVE</h2>
                    <button onclick="closeArchive()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 font-bold text-xl">&times;</button>
                </div>
                <div id="archive-grid" class="grid grid-cols-2 gap-4 pb-10"></div>
            </div>
        </div>

        <div id="share-overlay" class="hidden fixed inset-0 bg-slate-900/95 z-[60] flex items-center justify-center p-6 animate-[fadeIn_0.2s]">
            <div class="relative w-full max-w-sm">
                <button onclick="closeShare()" class="absolute -top-12 right-0 text-white text-3xl">&times;</button>
                <div id="poster-area" class="bg-white rounded-[2rem] overflow-hidden shadow-2xl border-4 border-monash">
                    <div class="bg-monash p-6 text-white text-center">
                        <p class="text-[10px] tracking-[0.3em] opacity-70 mb-1 uppercase">Monash Persona Indicator 2.0</p>
                        <h3 id="poster-type" class="text-4xl font-black italic tracking-tighter">TYPE</h3>
                        <p id="poster-name" class="text-lg font-bold mt-1"></p>
                    </div>
                    <div class="p-4">
                        <img id="poster-img" src="" class="w-full rounded-xl mb-4 border border-slate-100 shadow-sm">
                        <div class="bg-slate-50 p-4 rounded-xl border-l-4 border-monash mb-4">
                            <p id="poster-motto" class="text-slate-800 font-bold text-sm italic"></p>
                        </div>
                        <div class="flex justify-between items-center px-2 pb-2">
                            <div class="text-left leading-tight">
                                <p class="text-[10px] text-slate-400 font-bold uppercase">Candidate</p>
                                <p class="text-[11px] font-black text-monash italic">MATI CERTIFIED 2.0</p>
                            </div>
                            <div class="w-14 h-14 bg-white rounded p-0.5 shadow-sm border border-slate-100 overflow-hidden shrink-0">
                                <img src="./assets/Share.png" alt="QR Code" class="w-full h-full object-contain">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const matiDatabase = {
            "CGOF": { name: "华尔街之狼", ip: "乔丹·贝尔福特", motto: "哪怕每天要在Flinders挤火车，我也要在CBD赢过所有人。", desc: "简历厚过砖，白天Clayton卷GPA，晚上City卷Networking。", nemesis: "路人A、图书馆保安", partner: "美国队长", enemy: "大雄" },
            "CGOE": { name: "穿普拉达的女王", ip: "米兰达 (Miranda)", motto: "如果拿不到HD，那一定是因为你穿得太土了。", desc: "对细节有极致要求的代名词。住在City高层，拿最稳的分，过最有质感的生活。", nemesis: "环境杂音", partner: "芭比", enemy: "阿甘" },
            "CGHF": { name: "蝙蝠侠 (Batman)", ip: "布鲁斯·韦恩", motto: "我不是在Matheson，我是在守护我的哥谭。", desc: "在繁华中心保持独立。夜色是保护色，刷题是唯一的修行。", nemesis: "Matheson五楼的咳嗽声", partner: "钢铁侠", enemy: "杰克船长" },
            "CGHE": { name: "神探夏洛克", ip: "Sherlock Holmes", motto: "平凡的校园生活只会让大脑生锈。", desc: "极高智商，低耗电模式。住在繁华中心但只活在自己的逻辑里。", nemesis: "缺乏逻辑的沟通", partner: "灭霸", enemy: "罗恩·韦斯莱" },
            "SGOF": { name: "美国队长", ip: "Steve Rogers", motto: "I can do this all day (指的是复习)。", desc: "莫纳什正义化身，Clayton领袖。GPA 4.0且精力无限的六边形战士。", nemesis: "深夜不规律的干扰", partner: "华尔街之狼", enemy: "盖茨比" },
            "SGOE": { name: "芭比", ip: "Barbie", motto: "在Clayton，每天都是最棒的一天！", desc: "校园社交中心。自带高饱和度光环，总能把平淡的村里生活过出剧集感。", nemesis: "掉妆、8点的早课", partner: "穿普拉达的女王", enemy: "绿巨人" },
            "SGHF": { name: "灭霸", ip: "Thanos", motto: "只要响指一响，Assignment就会消失一半。", desc: "极度自律。不需要冗余社交，追求效率与秩序的极致化。", nemesis: "所有非必要的聚会", partner: "神探夏洛克", enemy: "杰克船长" },
            "SGHE": { name: "甘道夫", ip: "Gandalf", motto: "真正的学霸从不迟到，他总是在想要的时间出现。", desc: "深居简出但洞察全局。只在关键时刻现身，对学术有神秘的掌控力。", nemesis: "不严谨的查重报告", partner: "神探夏洛克", enemy: "钢铁侠" },
            "CDOF": { name: "了不起的盖茨比", ip: "Gatsby", motto: "在那盏绿灯熄灭前，我一定能交上我的Essay。", desc: "进场晚，但动静大。在截止日期前爆发惊人能量的浪漫主义者。", nemesis: "23:59的闹钟", partner: "杰克船长", enemy: "美国队长" },
            "CDOE": { name: "杰克船长", ip: "Jack Sparrow", motto: "你们会永远记住这一天，因为你们差一点就过不了Assignment！", desc: "策略性生存大师。利用运气与直觉在DDL的海浪中极限冲浪。", nemesis: "条块化的学术规章", partner: "盖茨比", enemy: "灭霸" },
            "CDHF": { name: "钢铁侠 (Iron Man)", ip: "Tony Stark", motto: "我不需要睡觉，我只需要能量棒和红牛。", desc: "天才熬夜选手。靠咖啡因和高科技在凌晨创造奇迹，社交电量极低。", nemesis: "低电量预警", partner: "蝙蝠侠", enemy: "甘道夫" },
            "CDHE": { name: "大雄 (Nobita)", ip: "野比大雄", motto: "多啦A梦，快借我一个写Assignment的道具！", desc: "极致的能量节省模式。在截止日期前会产生极强的求助防御机制。", nemesis: "所有形式的硬核测试", partner: "罗恩·韦斯莱", enemy: "华尔街之狼" },
            "SDOF": { name: "家人侠 (Dom)", ip: "Dominic Toretto", motto: "Family！", desc: "由于对固定圈子的极高忠诚度，成为了东南区的社交联结枢纽。", nemesis: "孤军奋战的场景", partner: "芭比", enemy: "灭霸" },
            "SDOE": { name: "罗恩·韦斯莱", ip: "Ron Weasley", motto: "为什么总是我？我只是想在东南区吃个鸡腿。", desc: "平凡中的幸存者。虽推崇能量节省，但在关键时刻总能被动通关。", nemesis: "高难度的实操Lab", partner: "大雄", enemy: "神探夏洛克" },
            "SDHF": { name: "绿巨人 (Hulk)", ip: "Bruce Banner", motto: "不要激怒我，否则我会把电脑屏幕拍碎！", desc: "平时温和沉默。一旦进入压力峰值会瞬间爆发，横扫所有论文任务。", nemesis: "崩溃的系统更新", partner: "钢铁侠", enemy: "芭比" },
            "SDHE": { name: "阿甘 (Gump)", ip: "Forrest Gump", motto: "生活就像一盒巧克力，你永远不知道下一门会不会挂。", desc: "对外部环境极度钝感。保持简单的生活逻辑，在莫纳什长跑中稳健前行。", nemesis: "复杂的规则逻辑", partner: "水豚", enemy: "穿普拉达的女王" },
            "ALCH": { name: "绝命酒蒙子", ip: "雷神索尔 (Thor)", motto: "我的血液里80%是酒，20%是Clayton的妖风。", desc: "莫纳什酒精亚文化的灵魂使者。比起绩点，更在意今夜的酒精浓度。", nemesis: "任何禁酒规定", partner: "杰克船长", enemy: "早八人" },
            "B-B-B-B": { name: "莫纳什水豚", ip: "Capybara", motto: "只要我不发疯，Clayton的妖风就吹不到我。", desc: "情绪极度稳定。在City与郊区、卷与躺之间达成了某种神秘的禅意平衡。", nemesis: "所有的突发干扰", partner: "阿甘", enemy: "混乱制造者" }
        };

        const questions = [
            { q: "1. 考虑下学期的住处时，你对地理位置的优先级是？", opts: [ 
                {text: "A. 靠近核心商圈（如 City），哪怕空间局促也希望下楼即是繁华。", val: "C", w: 1.5}, 
                {text: "B. 偏好安静的社区环境（如 Clayton），节省通勤精力以保障个人空间。", val: "S", w: 1.5}, 
                {text: "C. 倾向于交通枢纽节点（如 Carnegie），在便利性与安静程度间寻求平衡。", val: "B", w: 1.0} 
            ] },
            { q: "2. 关于周末的能量补给方式，哪种场景更吸引你？", opts: [ 
                {text: "A. 待在熟悉的居家空间，通过低频率的外部接触来深度休整。", val: "S", w: 1.0}, 
                {text: "B. 前往具有设计感的网红空间或城中热点，获取视觉与感官刺激。", val: "C", w: 1.0}, 
                {text: "C. 在区域性的商业中心进行适度消遣，保持一定的生活节奏感。", val: "B", w: 1.0} 
            ] },
            { q: "3. 完成高强度任务后，你首选的压力释放路径是？", opts: [ 
                {text: "A. 前往 The Nott 或酒吧，通过酒精和人群频率快速切换大脑频道。", val: "B", isAlc: true, w: 1.0}, 
                {text: "B. 预定一家高评价的餐厅进行正式餐饮体验，奖励自己的感官享受。", val: "C", w: 1.2}, 
                {text: "C. 彻底切断外部干扰，进入无干扰的深度睡眠或独处模式。", val: "S", w: 1.2} 
            ] },
            { q: "4. 面对一个三周后截止的长篇 Essay，你的启动逻辑是？", opts: [ 
                {text: "A. 预留出最后的‘高压窗口期’，利用极限状态下的爆发力完成产出。", val: "D", w: 1.5}, 
                {text: "B. 立即建立结构框架并进行初步排版，通过前置进度缓解后期焦虑。", val: "G", w: 1.5}, 
                {text: "C. 设定分阶段提醒，在截止前找到一个既不紧迫也不松散的节奏动笔。", val: "B", w: 1.0} 
            ] },
            { q: "5. 你如何处理本学期的 Lecture 录像资源？", opts: [ 
                {text: "A. 保持实时同步，习惯于当周消化并整理出系统性的笔记。", val: "G", w: 1.2}, 
                {text: "B. 考前进行针对性的‘知识补天’，在短时间内高浓度提取考点信息。", val: "D", w: 1.2}, 
                {text: "C. 按照课程章节模块进行成块处理，确保逻辑完整后再推进。", val: "B", w: 1.0} 
            ] },
            { q: "6. 在小组作业初期的协调会议上，你通常扮演？", opts: [ 
                {text: "A. 提议先在线下进行酒精破冰，认为良好的私人关系是合作的基础。", val: "B", isAlc: true, w: 1.0}, 
                {text: "B. 流程推动者，倾向于第一时间确立各成员的责任边界与进度表。", val: "G", w: 1.0}, 
                {text: "C. 观察性成员，在明确任务难度和他人投入度后再决定自己的参与程度。", val: "D", w: 1.0} 
            ] },
            { q: "7. 周五晚上的理想状态对你而言意味着？", opts: [ 
                {text: "A. 处于群体社交中（如聚餐、KTV），在互动中获取情感能量。", val: "O", w: 1.5}, 
                {text: "B. 维持极小范围的熟人互动，严格筛选参与人员以保障质量。", val: "B", w: 1.0}, 
                {text: "C. 回归私人领地，通过独处（如观影、阅读）来修复社交损耗。", val: "H", w: 1.5} 
            ] },
            { q: "8. 被拉入一个存在大量陌生人的社交场合时：", opts: [ 
                {text: "A. 询问是否有高品质酒精供应，将其作为压力的‘缓冲剂’。", val: "B", isAlc: true, w: 1.0}, 
                {text: "B. 展现出高社交探索欲，认为这是扩展认知边界的好机会。", val: "O", w: 1.2}, 
                {text: "C. 保持礼貌性社交距离，寻找契机撤回到舒适的心理安全区。", val: "H", w: 1.2} 
            ] },
            { q: "9. 在校园内偶遇仅有一面之缘的同学，你的反应是？", opts: [ 
                {text: "A. 策略性回避，在确认未被注意的情况下选择改变路线。", val: "H", w: 1.0}, 
                {text: "B. 评估社交必要性，根据对方状态决定是示意还是停下交谈。", val: "B", w: 1.0}, 
                {text: "C. 主动发起对话，通过即时的互动确认彼此的联结。", val: "O", w: 1.0} 
            ] },
            { q: "10. 经历了一整天高强度的跨校区满课后：", opts: [ 
                {text: "A. 依然有余力进行高强度的体力活动（如健身或球类运动）。", val: "F", w: 1.5}, 
                {text: "B. 能量彻底耗尽，必须立即关闭所有交流进入‘静默充电’模式。", val: "E", w: 1.5}, 
                {text: "C. 通过‘碎片化’的消遣（如短视频、零食）进行心理转场。", val: "B", w: 1.0} 
            ] },
            { q: "11. 关于假期的规划风格，你更倾向于？", opts: [ 
                {text: "A. 深度停留模式，在单一地点进行长时间的感官沉浸。", val: "E", w: 1.0}, 
                {text: "B. 高效探索模式，在有限时间内覆盖更多目标点。", val: "F", w: 1.0}, 
                {text: "C. 弹性休假模式，根据当下的即时状态决定活动强度。", val: "B", w: 1.0} 
            ] },
            { q: "12. 遇到连续的负面压力时，你的回升策略是？", opts: [ 
                {text: "A. 增加多巴胺摄入（如点一份高热量外卖）并进入深度休眠。", val: "E", w: 1.2}, 
                {text: "B. 通过身体的剧烈消耗（如大运动量）来排空负面情绪。", val: "F", w: 1.2}, 
                {text: "C. 通过高酒精浓度或密集的酒精社交来截断悲伤逻辑。", val: "B", isAlc: true, w: 1.0} 
            ] },
            { q: "13. 如果要举办一个 5 人聚会，你偏好的场地属性是？", opts: [ 
                {text: "A. 具有独特格调的 City 私人空间或露台。", val: "C", w: 1.0}, 
                {text: "B. 宽敞且具有居家烟火气的郊区住宅内。", val: "S", w: 1.0}, 
                {text: "C. 选址在公共交通便利的中间区域餐厅。", val: "B", w: 1.0} 
            ] },
            { q: "14. 面对难度极大的学术挑战时：", opts: [ 
                {text: "A. 频繁与导师沟通并拆解问题，追求逻辑严密性。", val: "G", w: 1.0}, 
                {text: "B. 利用强大的搜索能力与 AI 工具进行高通量的快速解决。", val: "D", w: 1.0}, 
                {text: "C. 观察并收集同伴进度，在确信有可行路径后再投入。", val: "B", w: 1.0} 
            ] },
            { q: "15. 你的即时通讯处理习惯是？", opts: [ 
                {text: "A. 严格分类机制，只针对高价值或紧急信息进行反馈。", val: "B", w: 1.0}, 
                {text: "B. 极高频率参与度，倾向于秒回并活跃在多个话题组中。", val: "O", w: 1.0}, 
                {text: "C. 异步处理习惯，认为用意念回复过即完成了社交。", val: "H", w: 1.0} 
            ] },
            { q: "16. 每天清晨起床时的状态反馈是？", opts: [ 
                {text: "A. 迅速激活，能有条不紊地完成复杂的出门准备。", val: "F", w: 1.0}, 
                {text: "B. 需要多次缓冲，直至最后时刻才被动觉醒。", val: "E", w: 1.0}, 
                {text: "C. 通过精确计算余量，维持一个低能耗但准时的过程。", val: "B", w: 1.0} 
            ] },
            { q: "17. 下午在图书馆，你更容易被哪种环境干扰？", opts: [ 
                {text: "A. 过分死寂的环境（让你感到莫名压抑）。", val: "C", w: 1.0}, 
                {text: "B. 任何细微的非自然声响（你对环境高度敏感）。", val: "S", w: 1.0}, 
                {text: "C. 虽然嘈杂但充满生活气息的公共区域。", val: "B", w: 1.0} 
            ] },
            { q: "18. 在小组作业中遇到‘白嫖’队友，你的行动是？", opts: [ 
                {text: "A. 坚决交涉并上报 Tutor，维护学术正义。", val: "G", w: 1.0}, 
                {text: "B. 算了，自己动手做完，效率第一不纠结。", val: "D", w: 1.0}, 
                {text: "C. 先观察其他队友反应，跟随多数人的策略。", val: "B", w: 1.0} 
            ] },
            { q: "19. 参加 O-Week 社团活动的目的更多是为了？", opts: [ 
                {text: "A. 增加人脉储备，寻找潜在的资源联结。", val: "O", w: 1.0}, 
                {text: "B. 寻找纯粹的同好兴趣点，拒绝无效社交。", val: "B", w: 1.0}, 
                {text: "C. 收集实用的周边礼品，对人群保持审慎观察。", val: "H", w: 1.0} 
            ] },
            { q: "20. 你认为自己对待‘新事物/新规定’的接受度是？", opts: [ 
                {text: "A. 第一时间上手测试，享受探索的兴奋感。", val: "F", w: 1.0}, 
                {text: "B. 等到不得不使用时才去了解，追求稳定。", val: "E", w: 1.0}, 
                {text: "C. 在观望他人评价后再决定投入精力的程度。", val: "B", w: 1.0} 
            ] }
        ];

        let currentIndex = 0;
        let score = { C:0, S:0, G:0, D:0, O:0, H:0, F:0, E:0 };
        let bScore = 0; let alcCount = 0;

        function startTest() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = questions[currentIndex];
            document.getElementById('progress-num').innerText = String(currentIndex + 1).padStart(2, '0');
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / 20) * 100}%`;
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 border-2 border-slate-100 rounded-2xl hover:border-monash hover:bg-blue-50 transition-all font-medium text-slate-700 bg-white active:scale-[0.98] text-sm leading-snug";
                b.innerText = opt.text;
                b.onclick = () => {
                    const w = opt.w || 1.0;
                    if(opt.val === 'B') bScore += w;
                    if(opt.isAlc) alcCount++;
                    if(opt.val !== 'B') score[opt.val] += w;
                    currentIndex++;
                    if(currentIndex < 20) renderQuestion(); else showResult();
                };
                container.appendChild(b);
            });
        }

        function tieBreaker(val1, val2, char1, char2) {
            if (val1 === val2) return Math.random() > 0.5 ? char1 : char2;
            return val1 > val2 ? char1 : char2;
        }

        function showResult(forcedCode = null) {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            window.scrollTo(0,0);

            let code = forcedCode;
            if (!code) {
                if (alcCount >= 4) code = "ALCH";
                else if (bScore >= 11) code = "B-B-B-B";
                else {
                    code = tieBreaker(score.C, score.S, 'C', 'S') + 
                           tieBreaker(score.G, score.D, 'G', 'D') + 
                           tieBreaker(score.O, score.H, 'O', 'H') + 
                           tieBreaker(score.F, score.E, 'F', 'E');
                }
            }

            const res = matiDatabase[code] || matiDatabase["CGOF"];
            document.getElementById('result-code').innerText = code;
            document.getElementById('result-ip').innerText = `${res.ip} | ${res.name}`;
            document.getElementById('result-motto').innerText = res.motto;
            document.getElementById('result-desc').innerText = res.desc;
            document.getElementById('result-nemesis').innerText = res.nemesis;
            document.getElementById('result-partner').innerText = res.partner;
            document.getElementById('result-enemy').innerText = res.enemy;
            document.getElementById('result-image').src = `./assets/${code}.png`;
        }

        function openArchive() {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = ''; 
            Object.keys(matiDatabase).forEach(code => {
                const item = matiDatabase[code];
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 flex flex-col active:scale-95 transition-transform cursor-pointer";
                card.onclick = () => { showResult(code); closeArchive(); };
                card.innerHTML = `<div class="aspect-square bg-slate-50"><img src="./assets/${code}.png" class="w-full h-full object-cover"></div><div class="p-2 text-center"><p class="font-black text-slate-800 text-[10px] truncate">${item.name}</p></div>`;
                grid.appendChild(card);
            });
            document.getElementById('archive-screen').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeArchive() {
            document.getElementById('archive-screen').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function generateShareImage() {
            const code = document.getElementById('result-code').innerText;
            const res = matiDatabase[code];
            document.getElementById('poster-type').innerText = code;
            document.getElementById('poster-name').innerText = res.ip + " | " + res.name;
            document.getElementById('poster-img').src = `./assets/${code}.png`;
            document.getElementById('poster-motto').innerText = `“${res.motto}”`;
            document.getElementById('share-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeShare() {
            document.getElementById('share-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
